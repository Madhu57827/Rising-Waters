{% extends "base.html" %}

{% block title %}Predict Flood{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/predict.css') }}">
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10 col-xl-9">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center mb-2">
                        🌊 Flood Prediction System
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Enter the required weather and rainfall details.
                    </p>

                    <form method="POST" action="{{ url_for('predict') }}">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Temperature (°C)</label>
                                <input type="number" step="any" name="temp" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Humidity (%)</label>
                                <input type="number" step="any" name="humidity" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cloud Cover (%)</label>
                                <input type="number" step="any" name="cloud_cover" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Annual Rainfall (mm)</label>
                                <input type="number" step="any" name="annual" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Jan-Feb Rainfall (mm)</label>
                                <input type="number" step="any" name="jan_feb" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Mar-May Rainfall (mm)</label>
                                <input type="number" step="any" name="mar_may" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Jun-Sep Rainfall (mm)</label>
                                <input type="number" step="any" name="jun_sep" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Oct-Dec Rainfall (mm)</label>
                                <input type="number" step="any" name="oct_dec" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Average June Rainfall (mm)</label>
                                <input type="number" step="any" name="avgjune" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Sub Region</label>
                                <input type="number" step="any" name="sub" class="form-control" required>
                            </div>

                        </div>

                        <div class="d-grid mt-4">

                            <button type="submit" class="btn btn-primary btn-lg">
                                🔍 Predict Flood Risk
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
